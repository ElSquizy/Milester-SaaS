name: Milester scheduler

# Hits the durable scheduler endpoint so campaigns activate/end and data syncs
# even when nobody has the app open. Requires two repo secrets:
#   CRON_SECRET  — same value set in Vercel env
#   APP_URL      — deployed base URL, e.g. https://milester-saas-lac.vercel.app
#
# NOTE: GitHub throttles scheduled workflows heavily (observed ~hourly, not
# every 10 min). For tighter timing use an external cron (cron-job.org) hitting
# the same endpoint; this workflow then acts as a backup.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets are configured
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          [ -n "$APP_URL" ]     || { echo "::error::Falta el secret APP_URL"; exit 1; }
          [ -n "$CRON_SECRET" ] || { echo "::error::Falta el secret CRON_SECRET"; exit 1; }

      - name: Trigger scheduler
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          code=$(curl -sS -m 120 -o /tmp/cron-out.json -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "${APP_URL%/}/api/cron")
          echo "HTTP $code"
          cat /tmp/cron-out.json 2>/dev/null || true
          echo ""
          if [ "$code" != "200" ]; then
            echo "::error::El scheduler devolvió HTTP $code (401=secreto no coincide, 503=CRON_SECRET no está en Vercel, 404=ruta inexistente)"
            exit 1
          fi
